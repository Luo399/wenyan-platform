name: Deploy Frontend to Aliyun OSS

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'vite.config.ts'
      - '.env.production'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_AUTH_SECRET: ${{ secrets.VITE_AUTH_SECRET }}
          VITE_API_BASE_URL: https://api.classicalab.cn

      - name: Install ossutil
        run: |
          wget https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64
          chmod +x ossutil64

      - name: Deploy to Aliyun OSS
        run: |
          ./ossutil64 cp -r ./dist oss://${{ secrets.OSS_BUCKET }}/ \
            -i ${{ secrets.OSS_ACCESS_KEY_ID }} \
            -k ${{ secrets.OSS_ACCESS_KEY_SECRET }} \
            -e oss-cn-zhongwei.aliyuncs.com \
            --acl public-read \
            --meta "Cache-Control:public,max-age=31536000"

      - name: Purge CDN cache
        run: |
          if [ -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            aws cloudfront create-invalidation \
              --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
              --paths "/*"
          else
            echo "CLOUDFRONT_DISTRIBUTION_ID not set, skipping cache purge"
          fi
