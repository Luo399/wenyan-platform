name: Deploy Backend to Aliyun Server

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            PROD_PATH="${{ secrets.SERVER_PROJECT_PATH }}"
            BRANCH="main"
            BACKEND_PATH="$PROD_PATH/backend"

            echo "=== [1/7] Clone or update repo ==="
            if [ ! -d "$PROD_PATH" ]; then
              git clone https://github.com/Luo399/wenyan-platform.git "$PROD_PATH"
            fi
            cd "$PROD_PATH"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo "=== [2/7] Create .env file ==="
            printf 'PORT=3000\nCORS_ORIGIN=https://www.classicalab.cn,https://classicalab.cn\nAUTH_SECRET=${{ secrets.AUTH_SECRET }}\n' > "$BACKEND_PATH/.env"
            cat "$BACKEND_PATH/.env"

            echo "=== [3/7] Install dependencies ==="
            cd "$BACKEND_PATH"
            rm -rf node_modules package-lock.json
            npm install --production

            echo "=== [4/7] Stop old process ==="
            pm2 delete wenyan-backend 2>&1 || true

            echo "=== [5/7] Start backend ==="
            cd "$BACKEND_PATH"
            pm2 start server.js --name wenyan-backend

            echo "=== [6/7] Wait for startup ==="
            sleep 3

            echo "=== [7/7] Health check ==="
            pm2 status
            curl -s http://127.0.0.1:3000/api/health || echo "HEALTH_CHECK_FAILED"
          EOF
