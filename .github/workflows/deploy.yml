name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_APP_ENV: production
          VITE_API_BASE: https://api.classicalab.cn

      - name: Upload build artifacts to OSS
        run: npm run upload:oss:dist
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_REGION: ${{ secrets.OSS_REGION }}

      - name: Upload failure notification
        if: failure()
        run: |
          echo "❌ 前端资源上传失败，请检查OSS配置"
          exit 1

  deploy-backend:
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - uses: actions/checkout@v5

      - name: SSH into server and deploy backend
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /www/wwwroot/api.classicalab.cn
            git pull origin main
            cd backend
            /www/server/nodejs/v24.16.0/bin/npm install --omit=dev --no-audit --no-fund
            /www/server/nodejs/v24.16.0/bin/node scripts/migrate.js
            /www/server/nodejs/v24.16.0/bin/node scripts/seed.js
            echo 'PORT=3000' > .env.production
            echo 'CORS_ORIGIN=https://www.classicalab.cn' >> .env.production
            echo 'JWT_SECRET=ef904286aafdbcf32353565a66afe42f901eb5c108b85e0614b68b17b027026a04caa3577c5e597b634bedd2b8ec3423d1f286aae13e0397e79b7bf1d92fed78' >> .env.production
            /www/server/nodejs/v24.16.0/bin/pm2 restart backend
            echo "Deploy completed at $(date)"
