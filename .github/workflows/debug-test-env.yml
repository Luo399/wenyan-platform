name: Debug Test Environment

on:
  push:
    branches:
      - feature-1
    paths:
      - 'scripts/fix-test-env.sh'
      - '.github/workflows/debug-test-env.yml'

jobs:
  debug:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4

      - name: Fix test backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            PROJECT_PATH="/www/wwwroot/wenyan-platform-test"
            BACKEND_PATH="$PROJECT_PATH/backend"

            echo "=== 1. 创建 .env 文件 ==="
            cat > "$BACKEND_PATH/.env" << 'ENVEOF'
PORT=3001
CORS_ORIGIN=https://test.classicalab.cn
AUTH_SECRET=wenyan-test-secret-2024
ENVEOF
            cat "$BACKEND_PATH/.env"

            echo ""
            echo "=== 2. 删除旧 PM2 进程 ==="
            pm2 delete wenyan-backend-test 2>&1 || true

            echo ""
            echo "=== 3. 重新安装依赖 ==="
            cd "$BACKEND_PATH"
            npm ci --production 2>&1 | tail -5

            echo ""
            echo "=== 4. 启动后端 ==="
            cd "$PROJECT_PATH"
            pm2 start backend/server.js --name wenyan-backend-test 2>&1
            sleep 2

            echo ""
            echo "=== 5. PM2 状态 ==="
            pm2 status

            echo ""
            echo "=== 6. 本地测试后端 ==="
            curl -s http://127.0.0.1:3001/api/health 2>&1 || echo "失败"

            echo ""
            echo "=== 7. PM2 错误日志 ==="
            pm2 logs wenyan-backend-test --nostream --lines 20 2>&1 || true

