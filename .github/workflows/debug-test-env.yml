name: Debug Test Environment

on:
  push:
    branches:
      - feature-1
    paths:
      - 'scripts/fix-test-env.sh'
      - '.github/workflows/debug-test-env.yml'
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4

      - name: Run fix script on server
        run: |
          scp -o StrictHostKeyChecking=no scripts/fix-test-env.sh ${{ secrets.SERVER_USER }}@${{ secrets.SSH_HOST }}:/tmp/
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SSH_HOST }} "chmod +x /tmp/fix-test-env.sh && /tmp/fix-test-env.sh"

