name: Deploy Backend to Test Server

on:
  push:
    branches:
      - feature-1
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend-test.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to test server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            TEST_PATH="${{ secrets.SERVER_PROJECT_PATH }}-test"
            BRANCH="feature-1"
            BACKEND_PATH="$TEST_PATH/backend"

            if [ ! -d "$TEST_PATH" ]; then
              git clone https://github.com/Luo399/wenyan-platform.git "$TEST_PATH"
            fi

            cd "$TEST_PATH"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            cat > "$BACKEND_PATH/.env" << 'ENVEOF'
PORT=3001
CORS_ORIGIN=http://test.classicalab.cn,https://test.classicalab.cn
AUTH_SECRET=wenyan-test-secret-2024
ENVEOF

            cd "$BACKEND_PATH"
            rm -rf node_modules package-lock.json
            npm install --production

            pm2 delete wenyan-backend-test 2>&1 || true
            pm2 start server.js --name wenyan-backend-test

            sleep 2
            pm2 status
          EOF

      - name: Configure Nginx reverse proxy for test
        run: |
          scp -o StrictHostKeyChecking=no scripts/configure-nginx-test.sh ${{ secrets.SERVER_USER }}@${{ secrets.SSH_HOST }}:/tmp/
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SSH_HOST }} "chmod +x /tmp/configure-nginx-test.sh && /tmp/configure-nginx-test.sh"