name: Deploy Backend to Test Server

on:
  push:
    branches:
      - feature-1
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend-test.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to test server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            TEST_PATH="${{ secrets.SERVER_PROJECT_PATH }}-test"
            BRANCH="feature-1"

            if [ ! -d "$TEST_PATH" ]; then
              git clone https://github.com/Luo399/wenyan-platform.git "$TEST_PATH"
            fi

            cd "$TEST_PATH"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            cd backend
            npm ci --production

            if pm2 describe wenyan-backend-test > /dev/null 2>&1; then
              pm2 reload wenyan-backend-test --update-env
            else
              cd ..
              pm2 start backend/server.js --name wenyan-backend-test -- --port 3001
            fi
          EOF

      - name: Configure Nginx reverse proxy for test
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            VHOST_DIR="/www/server/panel/vhost/nginx"
            SITE_DIR="/www/wwwroot/test-api.classicalab.cn"
            DOMAIN="test-api.classicalab.cn"

            mkdir -p "$SITE_DIR"
            
            cat > "$VHOST_DIR/$DOMAIN.conf" << 'NGINXEOF'
server {
    listen 80;
    listen [::]:80;
    server_name test-api.classicalab.cn;
    root /www/wwwroot/test-api.classicalab.cn;
    index index.html index.htm;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    access_log /www/wwwlogs/test-api.classicalab.cn.log;
    error_log /www/wwwlogs/test-api.classicalab.cn.error.log;
}
NGINXEOF

            nginx -t && nginx -s reload
            echo "Nginx 反向代理配置完成"
          EOF