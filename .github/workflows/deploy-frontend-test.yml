name: Deploy Frontend to Test OSS

on:
  push:
    branches:
      - feature-1
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'vite.config.ts'
      - '.env.production'
      - '.github/workflows/deploy-frontend-test.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_AUTH_SECRET: ${{ secrets.VITE_AUTH_SECRET }}

      - name: Install ossutil
        run: |
          wget https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64
          chmod +x ossutil64

      - name: Deploy to Aliyun OSS test bucket
        run: |
          ./ossutil64 cp -r ./dist oss://${{ secrets.OSS_TEST_BUCKET }}/ \
            -i ${{ secrets.OSS_ACCESS_KEY_ID }} \
            -k ${{ secrets.OSS_ACCESS_KEY_SECRET }} \
            -e oss-cn-guangzhou.aliyuncs.com \
            --meta "Cache-Control:public,max-age=31536000"